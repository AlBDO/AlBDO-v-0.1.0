name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bundler-reproducibility:
    name: Bundler Reproducibility
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run Deterministic Bundler Suite
        run: |
          cargo test --test bundler_emit_integration_tests
          cargo test bundler::plan::tests::test_build_bundle_plan_is_deterministic_for_unsorted_manifest -- --exact
          cargo test bundler::emit::tests::test_emit_bundle_artifacts_to_dir_writes_plan_runtime_map_wrapper_and_vendor -- --exact

  phase0-performance-gates:
    name: Phase 0 Performance Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run Golden Correctness Snapshots
        run: cargo test --test phase0_golden_correctness_tests

      - name: Run Benchmark Regression Gates
        run: cargo run --bin albedo-bench -- --config benchmarks/workloads.json --baseline benchmarks/baseline.json --assert-gates --output target/benchmarks/latest.json

      - name: Upload Benchmark Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: albedo-benchmark-report
          path: target/benchmarks/latest.json
          if-no-files-found: warn

  albedo-node:
    name: Albedo Node Bridge
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run Bridge Rust Tests
        run: cargo test --manifest-path crates/albedo-node/Cargo.toml

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Bridge JS Tooling
        run: npm ci --prefix crates/albedo-node

      - name: Verify Native Node Package
        run: npm run verify --prefix crates/albedo-node
