name: Albedo Node Release

on:
  workflow_dispatch:
  push:
    tags:
      - "albedo-node-v*"

jobs:
  build-and-pack:
    name: Build and Pack (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    defaults:
      run:
        working-directory: crates/albedo-node
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Package Dependencies
        run: npm ci

      - name: Verify Bridge Package
        run: npm run verify

      - name: Build npm Tarball
        run: npm pack

      - name: Upload Tarball Artifact
        uses: actions/upload-artifact@v4
        with:
          name: albedo-node-${{ matrix.os }}
          path: crates/albedo-node/*.tgz

  publish:
    name: Publish npm Package
    runs-on: ubuntu-latest
    needs:
      - build-and-pack
    if: startsWith(github.ref, 'refs/tags/albedo-node-v')
    defaults:
      run:
        working-directory: crates/albedo-node
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install Package Dependencies
        run: npm ci

      - name: Verify Package Before Publish
        run: npm run verify

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
